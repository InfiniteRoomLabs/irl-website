<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="lintel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c62828"/>
      <stop offset="50%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
    <radialGradient id="glow" cx="100%" cy="-10%" r="80%">
      <stop offset="0%" stop-color="#c62828" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#c62828" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#0c1a3a"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- top gradient bar (3px) -->
  <rect width="1200" height="6" fill="url(#lintel)"/>

  <!-- threshold mark + wordmark, top-left -->
  <g transform="translate(72,80)">
    <g transform="scale(1.6)">
      <rect x="3" y="3" width="18" height="18" stroke="#fff" stroke-width="1.2" fill="none"/>
      <path d="M9 21V9h6v12" stroke="#fff" stroke-width="1.2" fill="none"/>
      <path d="M9 9l-6-6M15 9l6-6M9 21l-6 0M15 21l6 0" stroke="#5a8ec7" stroke-width="0.8" opacity="0.55" fill="none"/>
      <rect x="3" y="3" width="18" height="2" fill="url(#lintel)"/>
    </g>
    <text x="56" y="32" font-family="Bebas Neue" font-size="28" letter-spacing="5" fill="#ffffff">INFINITE ROOM LABS</text>
  </g>

  <!-- main display: AUTOMATE / ALL THE THINGS. -->
  <g transform="translate(72,260)">
    <text font-family="Bebas Neue" font-size="172" letter-spacing="3" fill="#ffffff">AUTOMATE</text>
    <text y="160" font-family="Bebas Neue" font-size="172" letter-spacing="3">
      <tspan fill="#c62828">ALL</tspan><tspan fill="#ffffff" dx="40">THE THINGS.</tspan>
    </text>
  </g>

  <!-- gradient bar above the footer caption -->
  <rect x="72" y="540" width="1056" height="3" fill="url(#lintel)"/>

  <!-- footer caption -->
  <text x="72" y="582" font-family="IBM Plex Sans" font-weight="600" font-size="18" letter-spacing="3" fill="#5a8ec7">SOLO TECHNICAL CONSULTANCY  ·  LEXINGTON, KY  ·  WES@INFINITEROOMLABS.COM</text>
</svg>
